<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VUIT Walk-Up Assistance</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="page">

<header class="vuit-hero">
<img class="vuit-logo" src="Dimensional V_smaller_kiosk.png" alt="Vanderbilt University">
<h1>Request Submitted</h1>

<p class="hero-description">
Your request has been submitted successfully.<br>
A VUIT technician has been notified and will assist you shortly.
</p>

<div class="hero-divider"></div>
</header>

<section class="vuit-card">

<div class="check-circle">
<svg viewBox="0 0 100 100" class="check-svg">
<circle class="ring" cx="50" cy="50" r="42"/>
<path class="tick" d="M30 52 L45 67 L72 38"/>
</svg>
</div>

<div class="countdown-label">
Returning to the kiosk in
</div>

<div id="countdown">15</div>

<button id="returnBtn">
Start New Request
</button>

<p class="footer-note">
Thank you for visiting Vanderbilt Information Technology.
</p>

</section>

</div>

<script src="script.js"></script>

</body>
</html>
